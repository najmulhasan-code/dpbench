experiment:
  name: full_benchmark
  version: "1.0"

  parameters:
    episodes: 20
    max_timesteps: 30
    seed: 42
    temperature: 0.7
    save_transcript: true
    verbose: false

  models:
    - gpt-5.2
    - claude-opus-4.5
    - grok-4.1
    - gemini-2.5-pro

  conditions:
    - sim5nc
    - sim5c
    - seq5nc
    - seq5c
    - sim3nc
    - sim3c
    - seq3nc
    - seq3c

  output:
    base_dir: results
    save_jsonl: true
    save_transcript: true
    save_metrics: true
